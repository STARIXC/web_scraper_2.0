<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products Scraper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .log-output {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            height: 250px;
            overflow-y: scroll;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Web Scrapper V2</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/full-scraper">Full Website Scraper</a>
                <a class="nav-link active" aria-current="page" href="/product-scraper">Products Scraper</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4 text-center">Products-Only Scraper</h1>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-success text-white">Products Scraping Configuration</div>
            <div class="card-body">
                <form id="scraperForm">
                    <div class="mb-3">
                        <label for="url" class="form-label fw-bold">1. Listing / Shop URL</label>
                        <input type="url" id="url" name="url" class="form-control" placeholder="https://example.com/shop/" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="max_pages" class="form-label">2. Max Pages</label>
                            <input type="number" id="max_pages" name="max_pages" class="form-control" value="10" min="1">
                        </div>
                        <div class="col-md-6">
                            <label for="delay" class="form-label">3. Delay (seconds)</label>
                            <input type="number" id="delay" name="delay" class="form-control" value="1" min="0" step="0.1">
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                        <button type="submit" id="start-btn" class="btn btn-success btn-lg">Start Product Scrape</button>
                        <button type="button" id="stop-btn" class="btn btn-warning btn-lg" disabled>Stop Scraping</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white">Scrape Status & Output</div>
            <div class="card-body">
                <p class="lead mb-2">
                    Status: <span class="badge bg-info text-dark" id="status-text">Idle</span> |
                    Pages: <span class="fw-bold" id="pages-scraped">0</span>/<span id="max-pages">0</span>
                </p>

                <div class="progress mb-3" role="progressbar" aria-label="Scrape progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" id="progress-fill" style="width: 0%">0%</div>
                </div>

                <p class="fw-bold mb-1">Activity Log:</p>
                <div id="log-output" class="log-output card-text">Awaiting input...</div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">Data Actions</div>
            <div class="card-body d-grid gap-2 d-md-block">
                <p class="mb-2">Download Product Data:</p>
                <button id="products-page-btn" class="btn btn-outline-success" disabled>Open Products Page</button>
                <button id="download-products-btn" class="btn btn-success" disabled>Download Products JSON</button>
            </div>
        </div>
    </div>

    <script>
        let currentJobId = null;
        let pollInterval = null;

        function setUIState(state) {
            const isRunning = state === 'RUNNING';
            const isComplete = state === 'FINISHED' || state === 'STOPPED';

            document.getElementById('start-btn').disabled = isRunning;
            document.getElementById('stop-btn').disabled = !isRunning;
            document.getElementById('products-page-btn').disabled = !isComplete;
            document.getElementById('download-products-btn').disabled = !isComplete;

            if (isComplete) {
                const totalScraped = parseInt(document.getElementById('pages-scraped').textContent, 10);
                if (totalScraped === 0) {
                    document.getElementById('products-page-btn').disabled = true;
                    document.getElementById('download-products-btn').disabled = true;
                }
            }
        }

        document.getElementById('scraperForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = {
                url: form.url.value,
                max_pages: parseInt(form.max_pages.value, 10),
                delay: parseFloat(form.delay.value),
                tags: ['h1', 'p']
            };

            setUIState('STARTING');
            document.getElementById('status-text').textContent = 'Starting products scraper...';
            document.getElementById('log-output').textContent = 'Sending product scrape request to backend...\n';

            try {
                const response = await fetch('/start_product_scrape', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                const result = await response.json();
                if (response.ok) {
                    currentJobId = result.job_id;
                    pollStatus(currentJobId, formData.max_pages);
                } else {
                    document.getElementById('status-text').textContent = `ERROR: ${result.error}`;
                    setUIState('IDLE');
                }
            } catch (error) {
                document.getElementById('status-text').textContent = `NETWORK ERROR: ${error.message}`;
                setUIState('IDLE');
            }
        });

        function pollStatus(jobId, maxPages) {
            if (pollInterval) clearInterval(pollInterval);

            pollInterval = setInterval(async () => {
                const logElement = document.getElementById('log-output');
                try {
                    const response = await fetch(`/status/${jobId}`);
                    if (!response.ok) throw new Error('Failed to fetch status.');
                    const status = await response.json();

                    document.getElementById('status-text').textContent = status.status;
                    document.getElementById('pages-scraped').textContent = status.pages_scraped;
                    document.getElementById('max-pages').textContent = maxPages;

                    const progressPercent = Math.min((status.pages_scraped / maxPages) * 100, 100);
                    const progressFill = document.getElementById('progress-fill');
                    progressFill.style.width = `${progressPercent.toFixed(1)}%`;
                    progressFill.textContent = `${progressPercent.toFixed(1)}%`;

                    if (status.status === 'FINISHED') {
                        progressFill.classList.add('bg-success');
                        progressFill.classList.remove('bg-info', 'progress-bar-animated');
                    } else if (status.status === 'RUNNING') {
                        progressFill.classList.add('bg-info', 'progress-bar-animated');
                        progressFill.classList.remove('bg-success');
                    } else if (status.status === 'STOPPED') {
                        progressFill.classList.add('bg-warning');
                        progressFill.classList.remove('bg-success', 'bg-info', 'progress-bar-animated');
                    }

                    setUIState(status.status);

                    if (status.log && status.log.length > 0) {
                        logElement.textContent += status.log.join('\n') + '\n';
                        logElement.scrollTop = logElement.scrollHeight;
                    }

                    if (status.status === 'FINISHED' || status.status === 'STOPPED') {
                        clearInterval(pollInterval);
                        logElement.textContent += `\n--- Scraping ${status.status} ---\nTotal pages scraped: ${status.total_urls_scraped}`;
                    }
                } catch (error) {
                    clearInterval(pollInterval);
                    logElement.textContent += `\n[FATAL ERROR] Cannot connect to server or job lost. ${error.message}`;
                    setUIState('IDLE');
                }
            }, 2000);
        }

        document.getElementById('stop-btn').addEventListener('click', async () => {
            if (currentJobId) {
                setUIState('STOPPED');
                document.getElementById('status-text').textContent = 'Stopping...';
                await fetch(`/stop_scrape/${currentJobId}`, { method: 'POST' });
            }
        });

        document.getElementById('products-page-btn').addEventListener('click', () => {
            if (currentJobId && !document.getElementById('products-page-btn').disabled) {
                window.location.href = `/products/${currentJobId}`;
            }
        });

        document.getElementById('download-products-btn').addEventListener('click', () => {
            if (currentJobId && !document.getElementById('download-products-btn').disabled) {
                window.location.href = `/download_products/${currentJobId}`;
            }
        });
    </script>
</body>
</html>
